# WandB Sweep 配置 - Photo 数据集超参数搜索
# 目标：找到最佳 5-seed 超参数
# 预计时间：~15 小时（4 GPU 并行）

program: run.py
method: grid
name: photo_hyperparam_search
project: VoxG
entity: HCCS

parameters:
  dataset:
    value: photo
  train_rate:
    value: 0.05
  num_epoch:
    value: 200
  batch_size:
    value: 512
  model_type:
    value: VoxGFormer
  num_prompts:
    values: [4, 6, 8, 10, 12, 16]
  tokenizer_temp:
    values: [0.5, 0.8, 1.0, 1.5, 2.0]
  tokenizer_hallucination_ratio:
    values: [1.5, 2.0, 2.5, 3.0, 4.0]
  hallucination_temp_distance_scale:
    values: [0.0, 0.5, 1.0, 1.5]
  seed:
    values: [0, 1, 2, 3, 4]

# 组合数: 6 x 5 x 5 x 4 = 600
# 5 seed = 3000 experiments
# 4 GPU 并行, ~70s/experiment ≈ 15 hours