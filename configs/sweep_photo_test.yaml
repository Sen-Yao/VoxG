# Photo Quick Sweep - 测试幂等性保护
program: run.py
method: bayes
metric:
  name: AUC.max
  goal: maximize

parameters:
  dataset:
    value: photo
  model_type:
    value: VoxGFormer
  num_epoch:
    value: 200
  train_rate:
    value: 0.05
  warmup_updates:
    value: 50
  end_lr:
    value: 0.0001
  ring_R_max:
    value: 1
  ring_R_min:
    value: 0.3
  rec_loss_weight:
    value: 1
  ring_loss_weight:
    value: 1
  
  batch_size:
    values: [64, 128, 256]
  peak_lr:
    values: [0.0003, 0.0005, 0.001]
  pp_k:
    values: [4, 5, 6, 7]
  progregate_alpha:
    values: [0.1, 0.2, 0.3]
  seed:
    values: [0, 1, 2, 3, 4]
