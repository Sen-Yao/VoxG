# Photo Quick Sweep - 基于 4bd466f0 锚点
# 目标：找到最佳 5-seed 超参数配置

program: run.py
method: bayes
metric:
  name: AUC.max
  goal: maximize

parameters:
  # 固定参数（基于锚点）
  dataset:
    value: photo
  model_type:
    value: VoxGFormer
  num_epoch:
    value: 200
  train_rate:
    value: 0.05
  warmup_updates:
    value: 50
  end_lr:
    value: 0.0001
  ring_R_max:
    value: 1
  ring_R_min:
    value: 0.3
  rec_loss_weight:
    value: 1
  ring_loss_weight:
    value: 1
  
  # 搜索参数
  batch_size:
    values: [64, 128, 256]
  
  peak_lr:
    values: [0.0003, 0.0005, 0.001]
  
  pp_k:
    values: [4, 5, 6, 7]
  
  progregate_alpha:
    values: [0.1, 0.2, 0.3]
  
  seed:
    values: [0, 1, 2, 3, 4]
