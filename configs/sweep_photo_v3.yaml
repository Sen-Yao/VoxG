# Photo Sweep V3 - 全面搜索版
# 扩大搜索空间，包含 batch_size=1024

program: run.py
method: grid
name: photo_v3_full_search

parameters:
  # 固定参数
  dataset:
    value: photo
  model_type:
    value: VoxGFormer
  num_epoch:
    value: 200
  train_rate:
    value: 0.05
  warmup_updates:
    value: 50
  end_lr:
    value: 0.0001
  ring_R_max:
    value: 1
  ring_R_min:
    value: 0.3
  token_mode:
    value: original
  
  # ===== 搜索参数 =====
  progregate_alpha:
    values: [0.2, 0.3, 0.4, 0.5]
  
  pp_k:
    values: [4, 5, 6]
  
  batch_size:
    values: [256, 512, 1024]
  
  peak_lr:
    values: [0.0001, 0.0003, 0.0005]
  
  rec_loss_weight:
    values: [1.0, 2.0]
  
  # 5 seed
  seed:
    values: [0, 1, 2, 3, 4]

# 总 runs: 4 * 3 * 3 * 3 * 2 * 5 = 1080 runs
# 预计: 8 GPU 并行，每 run ~2 分钟，~4.5 小时
